---
# API pods: accept inbound from ingress-nginx only; allow outbound to redis and postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: booking-api-network-policy
  namespace: booking
spec:
  podSelector:
    matchLabels:
      app: booking-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: booking-redis
      ports:
        - protocol: TCP
          port: 6379
    - ports:
        - protocol: TCP
          port: 5432  # PostgreSQL (managed DB, outside cluster)
        - protocol: TCP
          port: 443   # HTTPS egress (ECR image pull, external APIs)
        - protocol: TCP
          port: 53    # DNS
        - protocol: UDP
          port: 53
---
# Worker pods: no inbound; outbound to redis and postgres only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: booking-worker-network-policy
  namespace: booking
spec:
  podSelector:
    matchLabels:
      component: worker
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: booking-redis
      ports:
        - protocol: TCP
          port: 6379
    - ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
---
# Redis: accept inbound from api and worker only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: booking-redis-network-policy
  namespace: booking
spec:
  podSelector:
    matchLabels:
      app: booking-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: booking-api
        - podSelector:
            matchLabels:
              component: worker
        - podSelector:
            matchLabels:
              component: beat
      ports:
        - protocol: TCP
          port: 6379
