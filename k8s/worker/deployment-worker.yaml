apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-worker
  namespace: booking
  labels:
    app: booking-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: booking-worker
        component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: worker
          image: YOUR_ECR_REGISTRY/booking-api:latest  # replaced by deploy workflow
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - booking.infrastructure.workers.celery_app.celery_app
            - worker
            - --loglevel=info
            - --concurrency=2
          envFrom:
            - configMapRef:
                name: booking-api-config
            - secretRef:
                name: booking-api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - celery -A booking.infrastructure.workers.celery_app.celery_app inspect ping -d celery@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
