services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: booking_test
      POSTGRES_PASSWORD: booking_test
      POSTGRES_DB: booking_test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_test -d booking_test_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_test:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
